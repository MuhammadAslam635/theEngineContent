# ─────────────────────────────────────────────
# ConfigMap: PostgreSQL
# ─────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: cont-gen
data:
  POSTGRES_DB: contgen
  POSTGRES_HOST: postgres-service
  POSTGRES_PORT: "5236"

---
# ─────────────────────────────────────────────
# ConfigMap: Backend Go
# ─────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-go-config
  namespace: cont-gen
data:
  APP_PORT: "9001"
  APP_ENV: development
  # AI Orchestration internal URL (not exposed externally)
  AI_ORCHESTRATION_URL: "http://ai-orchestration-service:8086"
  DB_HOST: postgres-service
  DB_PORT: "5236"
  DB_NAME: contgen

---
# ─────────────────────────────────────────────
# ConfigMap: AI Orchestration
# ─────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-orchestration-config
  namespace: cont-gen
data:
  APP_PORT: "8086"
  APP_ENV: development
  DB_HOST: postgres-service
  DB_PORT: "5236"
  DB_NAME: contgen

---
# ─────────────────────────────────────────────
# ConfigMap: Celery
# ─────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: celery-config
  namespace: cont-gen
data:
  CELERY_BROKER_URL: "redis://redis-service:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis-service:6379/0"
  FLOWER_PORT: "5555"

---
# ─────────────────────────────────────────────
# ConfigMap: Redis
# ─────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: cont-gen
data:
  REDIS_PORT: "6379"
