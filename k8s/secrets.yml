  namespace: cont-gen
type: Opaque
data:
  PGADMIN_DEFAULT_EMAIL: YWRtaW5AY29udGdlbi5jb20=   # admin@contgen.com
  PGADMIN_DEFAULT_PASSWORD: YWRtaW4xMjM=             # admin123
