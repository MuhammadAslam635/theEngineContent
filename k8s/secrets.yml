# ─────────────────────────────────────────────
# Secret: PostgreSQL credentials
# ─────────────────────────────────────────────
# All values are base64 encoded.
# To encode: echo -n "yourvalue" | base64
# Defaults below:
#   postgres / postgres_secret_password / contgen
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: cont-gen
type: Opaque
data:
  POSTGRES_USER: cG9zdGdyZXM=          # postgres
  POSTGRES_PASSWORD: cG9zdGdyZXNfc2VjcmV0X3Bhc3N3b3Jk  # postgres_secret_password

---
# ─────────────────────────────────────────────
# Secret: Backend Go JWT + DB
# ─────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: backend-go-secret
  namespace: cont-gen
type: Opaque
data:
  JWT_SECRET: c3VwZXJfc2VjcmV0X2p3dF9rZXlfY2hhbmdlX2luX3Byb2Q=  # super_secret_jwt_key_change_in_prod
  DB_USER: cG9zdGdyZXM=       # postgres
  DB_PASSWORD: cG9zdGdyZXNfc2VjcmV0X3Bhc3N3b3Jk

---
# ─────────────────────────────────────────────
# Secret: AI Orchestration DB
# ─────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: ai-orchestration-secret
  namespace: cont-gen
type: Opaque
data:
  DB_USER: cG9zdGdyZXM=
  DB_PASSWORD: cG9zdGdyZXNfc2VjcmV0X3Bhc3N3b3Jk

---
# ─────────────────────────────────────────────
# Secret: Kong admin
# ─────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: kong-secret
  namespace: cont-gen
type: Opaque
data:
  KONG_PG_PASSWORD: cG9zdGdyZXNfc2VjcmV0X3Bhc3N3b3Jk

---
# ─────────────────────────────────────────────
# Secret: pgAdmin login
# ─────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
