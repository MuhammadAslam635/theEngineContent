# ─────────────────────────────────────────────
# PVC: PostgreSQL data
# ─────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: cont-gen
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

